<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Directory Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
        }

        .glass-card {
            background: rgba(255, 255, 255, 1);
            border: 1px solid #e2e8f0;
            transition: transform 0.2s ease;
        }

        .input-field {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 0.75rem;
            outline: none;
            transition: all 0.2s;
        }

        .input-field:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            transition: all 0.2s;
            cursor: pointer;
        }

        .btn-primary {
            background-color: #4f46e5;
            color: white;
        }

        .btn-primary:hover {
            background-color: #4338ca;
        }

        .btn-secondary {
            background-color: #f8fafc;
            color: #475569;
            border: 1px solid #e2e8f0;
        }

        .btn-secondary:hover {
            background-color: #f1f5f9;
        }

        .btn-danger {
            background-color: #fff1f2;
            color: #e11d48;
            border: 1px solid #fecdd3;
        }

        .btn-danger:hover {
            background-color: #ffe4e6;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full space-y-8">
        
        <!-- Header -->
        <div class="text-center">
            <h1 class="text-3xl font-bold text-slate-900">Directory Manager</h1>
            <p class="text-slate-500 mt-2">Add, search, and manage user records</p>
        </div>

        <!-- Insert Details Section -->
        <div class="glass-card p-8 rounded-3xl shadow-xl">
            <h4 class="text-sm font-bold uppercase tracking-wider text-indigo-600 mb-6 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
                Insert Details
            </h4>
            
            <form id="F" class="space-y-5">
                <div class="space-y-1">
                    <label class="text-xs font-semibold text-slate-500 ml-1">Name</label>
                    <input type="text" id="name" placeholder="Enter full name" class="input-field">
                </div>
                
                <div class="space-y-1">
                    <label class="text-xs font-semibold text-slate-500 ml-1">Phone Number</label>
                    <input type="number" id="number" placeholder="Enter contact number" class="input-field">
                </div>

                <button type="submit" class="btn btn-primary w-full shadow-lg shadow-indigo-100">
                    Add to Database
                </button>
            </form>
        </div>

        <!-- Search and Action Section -->
        <div class="glass-card p-8 rounded-3xl shadow-xl">
            <h4 class="text-sm font-bold uppercase tracking-wider text-emerald-600 mb-6 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                Search Directory
            </h4>
            
            <div id="result" class="mb-4 text-center p-3 rounded-xl bg-slate-50 border border-dashed border-slate-200 text-slate-500 text-sm italic min-h-[44px] flex items-center justify-center">
                Search results will appear here
            </div>

            <div class="space-y-5">
                <div class="space-y-1">
                    <label class="text-xs font-semibold text-slate-500 ml-1">Search by Number</label>
                    <input type="number" id="searchNumber" placeholder="Search number..." class="input-field">
                </div>
                
                <div class="grid grid-cols-2 gap-3 SD">
                    <button class="btn btn-secondary flex items-center justify-center gap-2" onclick="searchUser()">
                        Search
                    </button>
                    <button class="btn btn-danger flex items-center justify-center gap-2" onclick="deleteUser()">
                        Delete
                    </button>
                </div>
            </div>
        </div>

        <!-- Footer Note -->
        <p class="text-center text-xs text-slate-400">
            Powered by Modern UI Engine
        </p>
    </div>

    <script>
        /**
         * Note for user: I have kept your IDs and function names exactly as requested.
         * Below is a simple internal database logic so the styling works in this preview.
         */
        let users = [];
        const resultDisplay = document.getElementById('result');

        document.getElementById('F').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const number = document.getElementById('number').value;

            if (name && number) {
                users.push({ name, number });
                this.reset();
                resultDisplay.innerHTML = `<span class="text-emerald-600 font-semibold">User "${name}" added!</span>`;
            } else {
                resultDisplay.innerHTML = `<span class="text-rose-500 font-semibold">Please fill all fields</span>`;
            }
        });

        function searchUser() {
            const num = document.getElementById('searchNumber').value;
            const user = users.find(u => u.number === num);
            
            if (user) {
                resultDisplay.innerHTML = `Found: <strong class="text-indigo-600 ml-1">${user.name}</strong>`;
            } else {
                resultDisplay.innerHTML = `<span class="text-slate-400">No user found with that number</span>`;
            }
        }

        function deleteUser() {
            const num = document.getElementById('searchNumber').value;
            const initialLength = users.length;
            users = users.filter(u => u.number !== num);
            
            if (users.length < initialLength) {
                resultDisplay.innerHTML = `<span class="text-rose-600 font-semibold">User deleted successfully</span>`;
                document.getElementById('searchNumber').value = '';
            } else {
                resultDisplay.innerHTML = `<span class="text-slate-400">Nothing to delete</span>`;
            }
        }
    </script>
</body>
</html>
